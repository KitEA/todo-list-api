bucket4j:
  enabled: true
  cache-to-use: jcache
  filters:
    - id: todo-read-rate-limit
      filter-method: servlet
      url: ^/api/todos$
      cache-name: todoReadBuckets
      strategy: first
      rate-limits:
        - cache-key: "getHeader('Authorization')"
          execute-condition: "getMethod() == 'GET'"
          bandwidths:
            - capacity: 2
              time: 1
              unit: minutes
    - id: todo-write-rate-limit
      filter-method: servlet
      url: ^/api/todos.*$
      cache-name: todoWriteBuckets
      strategy: first
      rate-limits:
        - cache-key: "getHeader('Authorization')"
          execute-condition: "getMethod() == 'POST' || getMethod() == 'PUT' || getMethod() == 'DELETE'"
          bandwidths:
            - capacity: 1
              time: 1
              unit: minutes
